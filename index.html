<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Weather Mood (Simple)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="ui">
    <h1>Weather Mood</h1>

    <div class="controls">
      <input id="locationInput" placeholder="Type a city (e.g., New York)" />
      <button id="goBtn">Go</button>
    </div>

    <p id="status" class="status"></p>
  </header>

  <main class="stage">

    <div class="readout" id="readout">
      Type a city and click Go.
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
